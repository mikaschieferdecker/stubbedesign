name: Deploy Website to All-Inkl

on:
  push:
    branches:
      - claude/ecstatic-cerf-lgdjuh

jobs:
  web-deploy:
    name: 🎉 Deploy HTML Files
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync HTML/CSS straight to All-Inkl
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./ 
        server-dir: ./
        # All-Inkl Kompatibilitäts-Einstellungen gegen ECONNRESET:
        port: 21
        force-secure: false # Erzwingt normales FTP, falls FTPS auf dem Port blockiert wird
        timeout: 60000      # Erhöht das Timeout auf 60 Sekunden
        exclude: |
          **/.git*
          **/.git*/**
